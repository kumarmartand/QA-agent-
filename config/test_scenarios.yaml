# ─────────────────────────────────────────────────────────────────────────────
# QA Bot — Test Scenarios Configuration
# Define custom test flows per application. This overrides default.yaml.
# ─────────────────────────────────────────────────────────────────────────────

target:
  url: "https://demo.playwright.dev/todomvc"
  test_depth: "full"

auth:
  type: "none"

# ── Browser UI Authentication ─────────────────────────────────────────────────
# Uncomment and fill in to test login-protected applications.
# Credentials are read from environment variables (set them in .env).
#
# Example for a Laravel / standard email+password login:
#
# ui_auth:
#   enabled: true
#   login_url: "/login"
#   success_indicator: "Dashboard"   # Text visible on page after login
#   credentials:
#     username: "${TEST_USERNAME}"
#     password: "${TEST_PASSWORD}"
#   selectors:
#     username: "input[name='email']"
#     password: "input[name='password']"
#     submit: "button[type='submit']"
#   post_login_wait:
#     network_idle: true
#     timeout_ms: 5000
#
# Example using a CSS selector as success_indicator:
#
# ui_auth:
#   enabled: true
#   login_url: "/login"
#   success_indicator: "#user-dropdown"   # DOM element present after login
#   credentials:
#     username: "${TEST_USERNAME}"
#     password: "${TEST_PASSWORD}"
#   selectors:
#     username: "input[type='email']"
#     password: "input[type='password']"
#     submit: ".login-submit-btn"
#   post_login_wait:
#     network_idle: false   # Use domcontentloaded instead of networkidle
#     timeout_ms: 8000

# ── Custom Navigation Tests ───────────────────────────────────────────────────
ui_tests:
  navigation:
    # Explicit paths to visit beyond auto-discovered links
    extra_paths:
      - "/"
      - "/about"
      - "/login"

  forms:
    # Named form test cases
    - name: "Contact form submission"
      selector: "form#contact"
      fields:
        - { name: "email", value: "test@example.com" }
        - { name: "message", value: "Automated QA test message" }
      submit_selector: "button[type=submit]"
      expected_text: "Thank you"

  buttons:
    # Buttons to explicitly test beyond auto-detection
    - selector: "button.cta-primary"
      name: "Primary CTA Button"
    - selector: "nav button"
      name: "Navigation buttons"

  login_flows:
    # Test multiple roles
    - name: "Regular user login"
      login_url: "/login"
      username_selector: "input[name=email]"
      password_selector: "input[name=password]"
      submit_selector: "button[type=submit]"
      username: "${QA_USERNAME}"
      password: "${QA_PASSWORD}"
      success_indicator: ".dashboard"   # CSS selector present after login
      post_login_tests:
        - "/dashboard"
        - "/profile"
        - "/settings"

    - name: "Admin user login"
      login_url: "/admin/login"
      username_selector: "input[name=username]"
      password_selector: "input[name=password]"
      submit_selector: "button[type=submit]"
      username: "${QA_ADMIN_USER}"
      password: "${QA_ADMIN_PASS}"
      success_indicator: ".admin-dashboard"
      post_login_tests:
        - "/admin/users"
        - "/admin/settings"

# ── Custom API Tests ──────────────────────────────────────────────────────────
api_tests:
  endpoints:
    - name: "Health check"
      method: "GET"
      path: "/health"
      expected_status: 200

    - name: "List users"
      method: "GET"
      path: "/api/users"
      expected_status: [200, 401]   # 401 is acceptable if auth required

    - name: "Create user (negative test)"
      method: "POST"
      path: "/api/users"
      body: {}
      expected_status: [400, 422]   # Validation errors expected
